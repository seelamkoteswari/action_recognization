<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .box {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,200,0.3);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #00ffcc;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        a {
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📝 Register</h2>
    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p>Already have account? <a href="/">Login</a></p>
</div>

</body>
</html>
